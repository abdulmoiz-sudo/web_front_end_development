<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>

<body>
    <div>
        <form action="">
            <label for="fname">First Name </label><br>
            <input type="text" placeholder="Enter your first name " required><br>

            <label for="Lname">Last Name </label><br>
            <input type="text" placeholder="Enter your last name" required><br>

            <label for="email">Email</label><br>
            <input type="email" placeholder="Enter your email" required><br>

            <label for="cnic">CNIC Number</label><br>
            <input for="cnic" placeholder="Enter your CNIC Number" required><br>

            <label for="PNum">Phone Number</label><br>
            <input type="number" required><br>

            <label for="date">Submittion Date</label><br>
            <input type="date"><br>

            <lable for="Range">You Skill Level</lable><br>
            <input type="range"><br>
            <p>Select the Course you want to Apply</p>
            <label for="CS"></label>
            <input type="checkbox" id="CS" name="course" value="CS">CS<br>

            <label for="SE"></label>
            <input type="checkbox" id="SE" name="course" value="SE">SE<br>

            <label for="AI"></label>
            <input type="checkbox" id="AI" name="course" value="AI">AI <br>

            <label for="gender"></label>
            <input type="radio" id="gender" name="gender">Male
            <input type="radio" id="gender" name="gender">Female<br>



            <button>Click Here</button><br>
        </form>
    </div>

</body>

</html>
